<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAlpha Store - Advanced</title>  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
    body{background:#f4f4f4;transition:0.3s;}
    .dark{background:#111;color:white;}

    nav{
      background:#111;color:white;
      display:flex;justify-content:space-between;
      align-items:center;padding:15px 20px;
      position:sticky;top:0;z-index:1000;
    }

    nav .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

    nav input{padding:8px;border-radius:8px;border:none;outline:none;}
    nav button{background:orange;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:bold;}

    .hero{background:linear-gradient(to right,#111,#444);color:white;text-align:center;padding:50px 20px;}

    .container{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:25px;}

    .product{background:white;width:260px;border-radius:15px;overflow:hidden;box-shadow:0 0 10px rgba(0,0,0,0.2);}
    .product img{width:100%;height:200px;object-fit:cover;}
    .product-content{text-align:center;padding:12px;}

    .price{color:green;font-size:18px;font-weight:bold;}

    .btn{padding:8px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
    .cart-btn{background:green;color:white;}
    .buy-btn{background:#111;color:white;}

    .cart-section{background:white;margin:25px;padding:20px;border-radius:15px;}

    .toast{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:10px;border-radius:10px;display:none;}

    .modal{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
      justify-content:center;align-items:center;
    }

    .modal-content{
      background:white;padding:20px;border-radius:10px;width:300px;
    }

    .modal-content input{width:100%;padding:8px;margin:5px 0;}

    .orders{
      background:#fff;margin:25px;padding:20px;border-radius:15px;
    }
  </style></head>
<body><nav>
  <h1>🛒 CodeAlpha Store</h1>  <div class="right">
    <input id="search" placeholder="Search" onkeyup="renderProducts()" />
    <button onclick="toggleMode()">🌙</button>
    <button onclick="openAuth()">Login</button>
    <button onclick="logout()">Logout</button>
    <span id="user"></span>
    <button>🛍 <span id="count">0</span></button>
  </div>
</nav><section class="hero">
  <h2>Smart Shopping Experience</h2>
  <p>Dynamic Store with Login & Orders</p>
</section><div class="container" id="productList"></div><section class="cart-section">
  <h2>Cart</h2>
  <ul id="cartItems"></ul>
  <p>Total: ₹<span id="total">0</span></p>
  <button onclick="placeOrder()">Place Order</button>
  <input id="coupon" placeholder="Coupon code" />
  <button onclick="applyCoupon()">Apply</button>
</section><section class="orders">
  <h2>Your Orders</h2>
  <div id="orderList"></div>
</section><footer>© 2026 CodeAlpha</footer><div class="toast" id="toast">Done ✔</div><div class="modal" id="auth">
  <div class="modal-content">
    <h3 id="title">Login</h3>
    <input id="u" placeholder="Username" />
    <input id="p" type="password" placeholder="Password" />
    <button onclick="auth()">Submit</button>
    <p onclick="toggle()" style="cursor:pointer;color:blue">Switch</p>
  </div>
</div><script>

let products=[
 {n:"Smart Watch",p:1999},
 {n:"Headphones",p:999},
 {n:"Shoes",p:2499},
 {n:"Phone",p:14999}
];

let cart=[];
let users=JSON.parse(localStorage.getItem("u")||"{}");
let cur=localStorage.getItem("cur");
let login=true;
let orders=JSON.parse(localStorage.getItem("o")||"{}");

renderProducts();
updateUser();
renderOrders();

function renderProducts(){
let box=document.getElementById("productList");
let s=document.getElementById("search").value?.toLowerCase()||"";
box.innerHTML="";

products.filter(x=>x.n.toLowerCase().includes(s)).forEach((x,i)=>{
box.innerHTML+=`
<div class='product'>
<div class='product-content'>
<h3>${x.n}</h3>
<p class='price'>₹${x.p}</p>
<button class='btn cart-btn' onclick='add(${i})'>Add</button>
</div></div>`;
});
}

function add(i){
if(!cur)return alert("Login required");
cart.push(products[i]);
updateCart();
toast();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;
document.getElementById("cartItems").innerHTML="";
let t=0;
cart.forEach(x=>{
 t+=x.p;
 document.getElementById("cartItems").innerHTML+=`<li>${x.n} ₹${x.p}</li>`;
});
document.getElementById("total").innerText=t;
}

function placeOrder(){
if(!cart.length)return;
let id="OD"+Date.now();
if(!orders[cur])orders[cur]=[];
orders[cur].push({id,items:[...cart],date:new Date().toLocaleString()});
localStorage.setItem("o",JSON.stringify(orders));
cart=[];
updateCart();
renderOrders();
alert("Order ID: "+id);
}

function renderOrders(){
let box=document.getElementById("orderList");
box.innerHTML="";
if(!orders[cur])return;
orders[cur].forEach(o=>{
box.innerHTML+=`<p>🧾 ${o.id} - ${o.items.length} items</p>`;
});
}

function toggleMode(){document.body.classList.toggle("dark");}

function toast(){
document.getElementById("toast").style.display="block";
setTimeout(()=>toast.style.display="none",1200);
}

function openAuth(){document.getElementById("auth").style.display="flex";}

function toggle(){login=!login;document.getElementById("title").innerText=login?"Login":"Register";}

function auth(){
let u=u.value,p=p.value;
if(login){
if(users[u]==p){cur=u;localStorage.setItem("cur",u);updateUser();}
else alert("Wrong");
}else{
users[u]=p;localStorage.setItem("u",JSON.stringify(users));toggle();}
}

function updateUser(){document.getElementById("user").innerText=cur?"👤 "+cur:"";}

function logout(){cur=null;localStorage.removeItem("cur");updateUser();}

</script></body>
</html>
