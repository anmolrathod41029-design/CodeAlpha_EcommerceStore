<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha FULL STACK</title>
    <style>
        /* General Reset & Body Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* Navbar Styles */
        .navbar {
            background-color: #121212;
            color: white;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }
        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .search-bar {
            padding: 10px;
            border-radius: 5px;
            border: none;
            flex-grow: 1;
            max-width: 250px;
        }
        .nav-btn {
            background-color: #ffaa00;
            color: #000;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .icon-btn {
            background-color: #ffaa00;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-weight: bold;
            margin: 0 10px;
        }

        /* Product Grid Styles */
        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .product-card {
            background-color: white;
            border-radius: 10px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
        }
        .product-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background-color: #eaeaea; /* Fallback color */
        }
        .product-title {
            font-size: 20px;
            margin: 15px 0 5px;
            font-weight: bold;
        }
        .product-desc {
            color: #666;
            font-size: 14px;
            margin: 0 0 10px;
        }
        .product-price {
            color: #008000;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        /* Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn-add {
            background-color: #008000;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-delete {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            🛒 CodeAlpha FULL STACK
        </div>
        <input type="text" class="search-bar" placeholder="Search products">
        <button class="icon-btn">🌙</button>
        <button class="nav-btn">Login/Register</button>
        <button class="nav-btn">Admin</button>
        <div class="user-info">
            👤 admin
        </div>
        <button class="nav-btn">🛍️ 0</button>
    </nav>

    <div class="container">
        
        <div class="product-card">
            <img src="smart-watch.jpg" alt="Smart Watch">
            <div class="product-title">Smart Watch</div>
            <div class="product-desc">Fitness tracking & heart rate monitor</div>
            <div class="product-price">₹1999</div>
            <div class="btn-group">
                <button class="btn-add">Add</button>
                <button class="btn-delete">Delete</button>
            </div>
        </div>

        <div class="product-card">
            <img src="headphones.jpg" alt="Headphones">
            <div class="product-title">Headphones</div>
            <div class="product-desc">Noise cancelling audio</div>
            <div class="product-price">₹1499</div>
            <div class="btn-group">
                <button class="btn-add">Add</button>
                <button class="btn-delete">Delete</button>
            </div>
        </div>

        <div class="product-card">
            <img src="smart-band.jpg" alt="Smart Band">
            <div class="product-title">Smart Band</div>
            <div class="product-desc">Fitness tracker</div>
            <div class="product-price">₹1299</div>
            <div class="btn-group">
                <button class="btn-add">Add</button>
                <button class="btn-delete">Delete</button>
            </div>
        </div>

    </div>

</body>
</html>
