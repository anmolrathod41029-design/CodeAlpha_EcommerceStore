<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CodeAlpha Store - FULL STACK PRO</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f4f4f4;transition:0.3s;}
.dark{background:#111;color:white;}

nav{
background:#111;color:white;
display:flex;justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;top:0;z-index:1000;
flex-wrap:wrap;
}

nav .right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
nav input{padding:8px;border-radius:8px;border:none;outline:none;}
nav button{background:orange;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:bold;}

.hero{
background:linear-gradient(to right,#111,#444);
color:white;
text-align:center;
padding:50px 20px;
}

.container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
padding:25px;
}

.product{
background:white;
width:260px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.product img{width:100%;height:200px;object-fit:cover;}
.product-content{text-align:center;padding:12px;}
.price{color:green;font-size:18px;font-weight:bold;}
.desc{font-size:13px;color:#555;margin:6px 0;}

.btn{padding:8px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;}
.cart-btn{background:green;color:white;}

.section{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

.toast{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:10px;
border-radius:10px;
display:none;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:320px;
text-align:center;
}

.modal-content input{width:100%;padding:8px;margin:5px 0;}

.sample{
margin-top:10px;
padding:10px;
background:#f2f2f2;
border-radius:8px;
font-size:13px;
color:#333;
}

</style></head>
<body><nav>
<h1>🛒 CodeAlpha FULL STACK</h1><div class="right">
<input id="search" placeholder="Search products" onkeyup="renderProducts()" />
<button onclick="toggleMode()">🌙</button>
<button onclick="openAuth()">Login</button>
<button onclick="openAdmin()">Admin</button>
<span id="user"></span>
<button>🛍 <span id="count">0</span></button>
</div>
</nav><section class="hero">
<h2>Full Stack E-Commerce System</h2>
<p>Firebase Ready • Razorpay Ready • Admin Dashboard</p>
</section><div class="container" id="productList"></div><div class="section">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="checkout()">Checkout (Razorpay Mock)</button>
</div><div class="section">
<h2>Orders</h2>
<div id="orders"></div>
</div><footer style="text-align:center;padding:20px;">© 2026 CodeAlpha Full Stack</footer><div class="toast" id="toast">Success ✔</div><!-- AUTH --><div class="modal" id="authModal">
<div class="modal-content">
<h3>Login</h3><input id="email" placeholder="Email" />
<input id="pass" type="password" placeholder="Password" />
<button onclick="login()">Login</button><div class="sample">
<b>Sample Login (For Testing)</b><br>
Username: admin<br>
Password: admin123
</div></div>
</div><!-- ADMIN --><div class="modal" id="adminModal">
<div class="modal-content">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Product Name" />
<input id="pprice" placeholder="Price" />
<input id="pimg" placeholder="Image URL" />
<input id="pdesc" placeholder="Description" />
<button onclick="addProduct()">Add Product</button>
</div>
</div><script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Smart Watch",price:1999,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500",desc:"Fitness tracking smartwatch"},
{name:"Headphones",price:999,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500",desc:"Noise cancelling audio"}
];

let cart=[];
let user=localStorage.getItem("user");
let orders=JSON.parse(localStorage.getItem("orders"))||{};

renderProducts();
updateUI();
renderOrders();

function renderProducts(){
let box=document.getElementById("productList");
let s=document.getElementById("search")?.value?.toLowerCase()||"";
box.innerHTML="";

products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
box.innerHTML+=`
<div class='product'>
<img src='${p.img}'/>
<div class='product-content'>
<h3>${p.name}</h3>
<p class='desc'>${p.desc}</p>
<p class='price'>₹${p.price}</p>
<button class='btn cart-btn' onclick='add(${i})'>Add</button>
</div></div>`;
});
}

function add(i){
if(!user)return alert("Login required");
cart.push(products[i]);
updateCart();
}

function updateCart(){
document.getElementById("count").innerText=cart.length;
let t=0;
document.getElementById("cartItems").innerHTML="";
cart.forEach(c=>{
t+=c.price;
document.getElementById("cartItems").innerHTML+=`<li>${c.name} ₹${c.price}</li>`;
});
document.getElementById("total").innerText=t;
}

function checkout(){
if(!cart.length)return;
let orderId="ORD"+Date.now();
let total=cart.reduce((a,b)=>a+b.price,0);

alert("Processing payment...");

setTimeout(()=>{
if(!orders[user])orders[user]=[];
orders[user].push({orderId,total,items:[...cart]});
localStorage.setItem("orders",JSON.stringify(orders));
cart=[];
updateCart();
renderOrders();
alert("Payment Success! Order ID: "+orderId);
},1500);
}

function renderOrders(){
let box=document.getElementById("orders");
box.innerHTML="";
if(!orders[user])return;
orders[user].forEach(o=>{
box.innerHTML+=`<p>🧾 ${o.orderId} | ₹${o.total}</p>`;
});
}

function toggleMode(){document.body.classList.toggle("dark");}

function toast(){document.getElementById("toast").style.display="block";setTimeout(()=>document.getElementById("toast").style.display="none",1000);}

function openAuth(){document.getElementById("authModal").style.display="flex";}

function login(){
let e=document.getElementById("email").value;
let p=document.getElementById("pass").value;

if((e=="admin" && p=="admin123") || (e && p)){
user=e;
localStorage.setItem("user",e);
document.getElementById("authModal").style.display="none";
updateUI();
}else alert("Invalid login");
}

function updateUI(){document.getElementById("user").innerText=user?"👤 "+user:"";}

function openAdmin(){document.getElementById("adminModal").style.display="flex";}

function addProduct(){
let n=document.getElementById("pname").value;
let p=document.getElementById("pprice").value;
let i=document.getElementById("pimg").value;
let d=document.getElementById("pdesc").value;

products.push({name:n,price:Number(p),img:i,desc:d});
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
alert("Product Added");
}

</script></body>
</html>
