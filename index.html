<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EliteCommerce | Premium Platform</title>
    <style>
        :root { 
            --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --bg: #f8fafc; --text: #1e293b; --card: #ffffff; --nav: #0f172a;
        }
        .dark-mode { 
            --bg: #0f172a; --text: #f1f5f9; --card: #1e293b; --nav: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        nav { 
            background: var(--nav); color: white; padding: 1rem 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); cursor: pointer; text-transform: uppercase; }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        nav input { padding: 10px 18px; border-radius: 25px; border: none; width: 250px; background: rgba(255,255,255,0.1); color: white; outline: none; }

        .page { display: none; padding: 40px 5%; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 18px; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.05); text-align: center; }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 20px; }
        .price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin: 10px 0; }

        .btn { padding: 12px 20px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        
        .box { background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 550px; margin: 0 auto; }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; background: var(--card); color: var(--text); }

        .history-item { background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 5px solid var(--primary); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; background: var(--success); color: white; }

        #loading { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')">EliteCommerce</div>
    <div class="nav-right">
        <input type="text" id="search" placeholder="Search tech..." onkeyup="renderProducts()">
        <button class="btn" style="background:none; color:white;" onclick="toggleTheme()">🌓</button>
        <button class="btn btn-primary" onclick="checkAuth('cart')">🛒 <span id="cart-count">0</span></button>
        <button class="btn btn-outline" style="border-color:white; color:white;" onclick="checkAuth('history')">📜 Orders</button>
        <span id="user-display" style="font-weight:bold; color:var(--primary); cursor:pointer;" onclick="logout()"></span>
    </div>
</nav>

<div id="loading"><div class="spinner"></div><h2 style="margin-top:20px;">Processing...</h2></div>

<div id="auth" class="page">
    <div class="box" id="auth-box">
        <h2 id="auth-title">Login to Elite</h2>
        <input type="text" id="auth-user" placeholder="Username">
        <input type="password" id="auth-pass" placeholder="Password">
        <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="handleAuth()">Submit</button>
        <p onclick="toggleAuthMode()" style="text-align:center; margin-top:15px; cursor:pointer; color:var(--primary);">Switch Login/Register</p>
    </div>
</div>

<div id="home" class="page active-page">
    <h2 style="text-align: center;">Featured Premium Tech</h2>
    <div class="grid" id="product-grid"></div>
</div>

<div id="cart" class="page">
    <div class="box">
        <h2>Order Summary</h2>
        <div id="cart-items-list" style="margin: 20px 0;"></div>
        <hr><br>
        <div style="display:flex; justify-content:space-between"><span>Grand Total (Inc. Tax)</span><b id="sum-total">₹0</b></div>
        <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="showPage('details')">Next: Shipping Details</button>
    </div>
</div>

<div id="details" class="page">
    <div class="box">
        <h2>Shipping Address</h2>
        <input type="text" id="c-name" placeholder="Receiver Name">
        <textarea id="c-addr" placeholder="Full Address" rows="3"></textarea>
        <button class="btn btn-primary" style="width: 100%;" onclick="showPage('payment')">Proceed to Payment</button>
    </div>
</div>

<div id="payment" class="page">
    <div class="box">
        <h2>Secure Payment</h2>
        <label style="display:block; padding:15px; border:1px solid #ddd; border-radius:10px; margin:10px 0;">
            <input type="radio" name="pm" value="UPI" checked> UPI / NetBanking
        </label>
        <label style="display:block; padding:15px; border:1px solid #ddd; border-radius:10px; margin:10px 0;">
            <input type="radio" name="pm" value="COD"> Cash on Delivery
        </label>
        <button class="btn btn-primary" style="width: 100%;" onclick="processOrder()">Complete Purchase</button>
    </div>
</div>

<div id="history" class="page">
    <h2 style="text-align:center; margin-bottom:30px;">Your Order History</h2>
    <div id="order-history-list" style="max-width: 800px; margin: 0 auto;"></div>
</div>

<div id="success" class="page">
    <div class="box" style="text-align:center;">
        <h1 style="color:var(--success)">🎉 Success!</h1>
        <p>Your order has been placed successfully.</p>
        <div style="background:var(--bg); padding:20px; border-radius:15px; margin:20px 0;">
            <p>ID: <b id="final-tid"></b></p>
        </div>
        <button class="btn btn-primary" onclick="showPage('home')">Continue Shopping</button>
    </div>
</div>

<script>
// Data Initialization
const baseItems = [
    { n: "Precision Laptop", p: 72000, i: "https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500" },
    { n: "Elite Buds Pro", p: 14999, i: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" },
    { n: "Infinity Watch", p: 5999, i: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" }
];
let products = [];
for(let i=0; i<528; i++) {
    let b = baseItems[i % baseItems.length];
    products.push({ id: i, name: `${b.n} v${i+1}`, price: b.p + (i*5), img: b.i });
}

let cart = [];
let currentUser = localStorage.getItem("activeUser") || null;
let users = JSON.parse(localStorage.getItem("users")) || {};
let allOrders = JSON.parse(localStorage.getItem("orders")) || {};
let isLoginMode = true;

// Auth Logic
function toggleAuthMode() {
    isLoginMode = !isLoginMode;
    document.getElementById("auth-title").innerText = isLoginMode ? "Login to Elite" : "Register Account";
}

function handleAuth() {
    const u = document.getElementById("auth-user").value;
    const p = document.getElementById("auth-pass").value;
    if(!u || !p) return alert("Fill all fields");

    if(isLoginMode) {
        if(users[u] && users[u] === p) {
            login(u);
        } else alert("Invalid credentials");
    } else {
        if(users[u]) return alert("User exists");
        users[u] = p;
        localStorage.setItem("users", JSON.stringify(users));
        login(u);
    }
}

function login(u) {
    currentUser = u;
    localStorage.setItem("activeUser", u);
    updateNav();
    showPage('home');
}

function logout() {
    if(confirm("Logout?")) {
        localStorage.removeItem("activeUser");
        location.reload();
    }
}

function checkAuth(target) {
    if(!currentUser) {
        showPage('auth');
    } else {
        showPage(target);
    }
}

function updateNav() {
    document.getElementById("user-display").innerText = currentUser ? `👤 ${currentUser}` : "";
}

// Store Logic
function renderProducts() {
    const grid = document.getElementById("product-grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    products.filter(p => p.name.toLowerCase().includes(q)).slice(0, 20).forEach(p => {
        const inCart = cart.some(c => c.id === p.id);
        grid.innerHTML += `
            <div class="card">
                <img src="${p.img}">
                <div class="card-body">
                    <h3>${p.name}</h3>
                    <div class="price">₹${p.price}</div>
                    <button class="btn btn-primary" onclick="addToCart(${p.id})">${inCart ? 'In Cart' : 'Add to Cart'}</button>
                </div>
            </div>`;
    });
}

function addToCart(id) {
    if(!currentUser) return showPage('auth');
    if(!cart.some(c => c.id === id)) cart.push(products[id]);
    updateCart();
}

function updateCart() {
    document.getElementById("cart-count").innerText = cart.length;
    let list = document.getElementById("cart-items-list");
    let total = 0;
    list.innerHTML = cart.length ? "" : "<h4>Empty Cart</h4>";
    cart.forEach(item => {
        total += item.price;
        list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
            <span>${item.name}</span><b>₹${item.price}</b>
        </div>`;
    });
    document.getElementById("sum-total").innerText = "₹" + Math.round(total * 1.18);
}

function processOrder() {
    const tid = "ELITE-" + Date.now();
    const orderData = {
        id: tid,
        date: new Date().toLocaleDateString(),
        total: document.getElementById("sum-total").innerText,
        items: cart.map(i => i.name).join(", "),
        status: "Shipped"
    };

    document.getElementById("loading").style.display = "flex";
    setTimeout(() => {
        if(!allOrders[currentUser]) allOrders[currentUser] = [];
        allOrders[currentUser].push(orderData);
        localStorage.setItem("orders", JSON.stringify(allOrders));
        
        cart = [];
        updateCart();
        document.getElementById("final-tid").innerText = tid;
        document.getElementById("loading").style.display = "none";
        renderHistory();
        showPage('success');
    }, 2000);
}

function renderHistory() {
    const list = document.getElementById("order-history-list");
    list.innerHTML = "";
    if(!currentUser || !allOrders[currentUser]) {
        list.innerHTML = "<p style='text-align:center;'>No orders yet.</p>";
        return;
    }
    allOrders[currentUser].slice().reverse().forEach(o => {
        list.innerHTML += `
            <div class="history-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b>Order ${o.id}</b>
                    <span class="status-badge">${o.status}</span>
                </div>
                <p style="font-size:0.9rem; color:#888;">Items: ${o.items}</p>
                <div style="display:flex; justify-content:space-between; margin-top:10px;">
                    <span>Date: ${o.date}</span>
                    <b style="color:var(--primary)">${o.total}</b>
                </div>
            </div>`;
    });
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.getElementById(id).classList.add('active-page');
    if(id === 'history') renderHistory();
}

function toggleTheme() { document.body.classList.toggle("dark-mode"); }

// Init
updateNav();
renderProducts();
renderHistory();
</script>
</body>
</html>
