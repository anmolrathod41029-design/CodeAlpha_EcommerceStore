<!DOCTYPE html>
<html>
<head>
  <title>CodeAlpha E-commerce Store</title>

  <style>

    body{
      font-family: Arial;
      margin:0;
      padding:0;
      background:#f2f2f2;
    }

    nav{
      background:#111;
      color:white;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    nav h2{
      margin:0;
    }

    nav button{
      background:orange;
      border:none;
      padding:10px;
      border-radius:5px;
      cursor:pointer;
    }

    .container{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:30px;
    }

    .product{
      background:white;
      width:250px;
      margin:15px;
      padding:20px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    .product img{
      width:100%;
      border-radius:10px;
    }

    button{
      background:green;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

    button:hover{
      background:darkgreen;
    }

  </style>
</head>

<body>

<nav>
  <h2>🛒 CodeAlpha Store</h2>
  <button onclick="openCart()">Cart 🛍</button>
</nav>

<div class="container">

  <div class="product">
    <img src="https://via.placeholder.com/250">
    <h3>Smart Watch</h3>
    <p>₹1999</p>
    <button onclick="cart()">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250">
    <h3>Headphones</h3>
    <p>₹999</p>
    <button onclick="cart()">Add to Cart</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/250">
    <h3>Shoes</h3>
    <p>₹1499</p>
    <button onclick="cart()">Add to Cart</button>
  </div>

</div>

<script>

function cart(){
  alert("Product Added to Cart!");
}

function openCart(){
  alert("Cart Page Coming Soon!");
}

</script>

</body>
</html>
