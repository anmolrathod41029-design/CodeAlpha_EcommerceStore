<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeAlpha Store - Final Clean Version</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#f4f4f4;
transition:0.3s;
}

.dark{
background:#111;
color:white;
}

/* NAV */
nav{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
position:sticky;
top:0;
z-index:1000;
flex-wrap:wrap;
}

nav .right{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

nav input{
padding:8px;
border:none;
border-radius:8px;
outline:none;
}

nav button{
background:orange;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(to right,#111,#444);
color:white;
text-align:center;
padding:50px 20px;
}

/* ✅ FIXED GRID (NO OVERLAP) */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:25px;
align-items:stretch;
}

/* PRODUCT CARD */
.product{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.2);
display:flex;
flex-direction:column;
}

.product img{
width:100%;
height:180px;
object-fit:cover;
display:block;
}

.product-content{
text-align:center;
padding:12px;
flex:1;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

.desc{
font-size:13px;
color:#555;
margin:6px 0;
}

/* BUTTONS */
.btn{
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

.cart-btn{
background:green;
color:white;
}

.del-btn{
background:red;
color:white;
}

/* SECTIONS */
.section{
background:white;
margin:20px;
padding:20px;
border-radius:15px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:320px;
text-align:center;
position:relative;
}

.close{
position:absolute;
top:5px;
right:10px;
cursor:pointer;
font-size:18px;
}

.modal-content input{
width:100%;
padding:8px;
margin:5px 0;
}

/* SAMPLE BOX */
.sample{
margin-top:10px;
background:#f2f2f2;
padding:10px;
border-radius:8px;
font-size:13px;
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>🛒 CodeAlpha Store</h2>

<div class="right">
<input id="search" placeholder="Search" onkeyup="renderProducts()"/>
<button onclick="toggle()">🌙</button>
<button onclick="openAuth()">Login</button>
<button onclick="openAdmin()">Admin</button>
<span id="user"></span>
<button>🛍 <span id="count">0</span></button>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Final E-Commerce Project</h1>
<p>Clean UI • No Overlap • Full Working System</p>
</section>

<!-- PRODUCTS -->
<div class="container" id="products"></div>

<!-- CART -->
<div class="section">
<h2>Cart</h2>
<ul id="cart"></ul>
<p>Total: ₹<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<!-- LOGIN -->
<div class="modal" id="auth">
<div class="modal-content">
<span class="close" onclick="closeAuth()">✖</span>
<h3>Login</h3>

<input id="u" placeholder="Username">
<input id="p" type="password" placeholder="Password">
<button onclick="login()">Submit</button>

<div class="sample">
<b>Sample Login</b><br>
Username: admin<br>
Password: admin123
</div>

</div>
</div>

<!-- ADMIN -->
<div class="modal" id="admin">
<div class="modal-content">
<span class="close" onclick="closeAdmin()">✖</span>
<h3>Admin Panel</h3>

<input id="n" placeholder="Name">
<input id="pr" placeholder="Price">
<input id="img" placeholder="Image URL">
<input id="d" placeholder="Description">

<button onclick="add()">Add Product</button>
</div>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Smart Watch",price:1999,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500",desc:"Fitness tracking smartwatch"},
{name:"Headphones",price:1499,img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500",desc:"Noise cancelling audio"},
{name:"Shoes",price:2499,img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500",desc:"Comfortable running shoes"},
{name:"Phone",price:14999,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500",desc:"High performance smartphone"},
{name:"Laptop",price:45999,img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500",desc:"Powerful laptop"},
{name:"Mouse",price:799,img:"https://images.unsplash.com/photo-1527814050087-3793815479db?w=500",desc:"Gaming mouse"},
{name:"Keyboard",price:999,img:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500",desc:"Mechanical keyboard"},
{name:"Backpack",price:699,img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=500",desc:"Travel backpack"},
{name:"Speaker",price:1299,img:"https://images.unsplash.com/photo-1589003077984-894e133dabab?w=500",desc:"Bluetooth speaker"},
{name:"TV",price:27999,img:"https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?w=500",desc:"4K Smart TV"},
{name:"Watch",price:999,img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500",desc:"Classic watch"},
{name:"Perfume",price:899,img:"https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=500",desc:"Long lasting fragrance"},
{name:"Camera",price:32999,img:"https://images.unsplash.com/photo-1519183071298-a2962be96f83?w=500",desc:"DSLR camera"},
{name:"Sunglasses",price:499,img:"https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=500",desc:"UV protection glasses"},
{name:"Smart Band",price:1299,img:"https://images.unsplash.com/photo-1510017803434-a899398421b3?w=500",desc:"Fitness tracker"}
];

let cart=[];
let user=localStorage.getItem("user");

renderProducts();
updateUI();

function renderProducts(){
let box=document.getElementById("products");
let s=document.getElementById("search").value.toLowerCase();
box.innerHTML="";

products.filter(p=>p.name.toLowerCase().includes(s)).forEach((p,i)=>{
box.innerHTML+=`
<div class="product">
<img src="${p.img}">
<div class="product-content">
<h3>${p.name}</h3>
<p class="desc">${p.desc}</p>
<p class="price">₹${p.price}</p>

<button class="btn cart-btn" onclick="add(${i})">Add</button>
<button class="btn del-btn" onclick="del(${i})">Delete</button>
</div>
</div>`;
});
}

function add(i){
if(!user)return alert("Login required");
cart.push(products[i]);
update();
}

function del(i){
if(user!=="admin")return alert("Only admin can delete");
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
}

function update(){
document.getElementById("count").innerText=cart.length;

let t=0;
document.getElementById("cart").innerHTML="";

cart.forEach(c=>{
t+=c.price;
document.getElementById("cart").innerHTML+=`<li>${c.name} ₹${c.price}</li>`;
});

document.getElementById("total").innerText=t;
}

function checkout(){
alert("Order placed!");
cart=[];
update();
}

function toggle(){
document.body.classList.toggle("dark");
}

/* AUTH */
function openAuth(){document.getElementById("auth").style.display="flex";}
function closeAuth(){document.getElementById("auth").style.display="none";}

/* ADMIN */
function openAdmin(){document.getElementById("admin").style.display="flex";}
function closeAdmin(){document.getElementById("admin").style.display="none";}

/* LOGIN */
function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if((u==="admin" && p==="admin123") || (u && p)){
user=u;
localStorage.setItem("user",u);
closeAuth();
updateUI();
}else alert("Invalid login");
}

function updateUI(){
document.getElementById("user").innerText=user?"👤 "+user:"";
}

/* ADD PRODUCT */
function add(){
let n=document.getElementById("n").value;
let pr=document.getElementById("pr").value;
let img=document.getElementById("img").value;
let d=document.getElementById("d").value;

products.push({name:n,price:+pr,img,desc:d});
localStorage.setItem("products",JSON.stringify(products));
renderProducts();
alert("Product Added");
}

</script>

</body>
</html>
