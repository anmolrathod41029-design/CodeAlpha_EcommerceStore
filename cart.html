<!DOCTYPE html>
<html>
<head>
  <title>Shopping Cart</title>

  <style>

    body{
      font-family:Arial;
      background:#f2f2f2;
      text-align:center;
      padding:30px;
    }

    .cart-box{
      background:white;
      padding:30px;
      border-radius:10px;
      width:300px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    button{
      background:green;
      color:white;
      border:none;
      padding:10px 20px;
      border-radius:5px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="cart-box">

<h1>🛍 Shopping Cart</h1>

<p>1 Product Added</p>

<h3>Total: ₹1999</h3>

<button onclick="order()">Place Order</button>

</div>

<script>

function order(){
  alert("Order Placed Successfully!");
}

</script>

</body>
</html>
